name: Maintainer Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  intake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: kobe8cong/maintainer-gate@v0.1.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          fail-on: high
          format: markdown
          comment: true
